{% load handwriting %}
{% if show_edit_button %}
  <div class="cluster">
    <h2>
      {{ education.title }}
    </h2>
    <svg class="edit-icon-small" hx-get="{{ education.edit_flat_url }}" hx-target="closest div" hx-swap="outerHTML">
      <use href="#edit"></use>
    </svg>
  </div>
{% else %}
  <h2>
    {% handwriting_label education.title %}
  </h2>
{% endif %}
